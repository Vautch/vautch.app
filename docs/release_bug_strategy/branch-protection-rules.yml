# Branch Protection Rules — vautch.app
#
# Como aplicar:
# Opção 1 (recomendado): Via GitHub UI → Settings → Branches → Add rule
# Opção 2: Via GitHub CLI → gh api (exemplos abaixo)
# Opção 3: Via Terraform / GitHub Actions com token de admin
#
# Substitua "Vautch/vautch.app" pelo seu repositório onde necessário.

# ==============================================================================
# BRANCH: main (Production)
# ==============================================================================
#
# gh api repos/Vautch/vautch.app/branches/main/protection \
#   --method PUT \
#   --input branch-protection-main.json

# branch-protection-main.json:
{
  "required_status_checks": {
    "strict": true,
    "contexts": [
      "ci/tests",
      "ci/lint",
      "ci/build"
    ]
  },
  "enforce_admins": true,
  "required_pull_request_reviews": {
    "dismiss_stale_reviews": true,
    "require_code_owner_reviews": true,
    "required_approving_review_count": 2,
    "require_last_push_approval": true
  },
  "restrictions": null,
  "required_linear_history": true,
  "allow_force_pushes": false,
  "allow_deletions": false,
  "block_creations": false,
  "required_conversation_resolution": true,
  "lock_branch": false
}

# Regras aplicadas em `main`:
# ✅ Require 2 approving reviews
# ✅ Dismiss stale reviews on new push
# ✅ Require review from Code Owner
# ✅ Require last push approval
# ✅ Require status checks to pass (CI obrigatório)
# ✅ Require branch to be up to date before merging
# ✅ Require linear history (no merge commits)
# ✅ Require conversation resolution
# ✅ No force pushes
# ✅ No deletions
# ✅ Enforce for admins

# ==============================================================================
# BRANCH: develop (Dev / Homolog)
# ==============================================================================
#
# gh api repos/Vautch/vautch.app/branches/develop/protection \
#   --method PUT \
#   --input branch-protection-develop.json

# branch-protection-develop.json:
{
  "required_status_checks": {
    "strict": true,
    "contexts": [
      "ci/tests",
      "ci/lint"
    ]
  },
  "enforce_admins": false,
  "required_pull_request_reviews": {
    "dismiss_stale_reviews": true,
    "require_code_owner_reviews": false,
    "required_approving_review_count": 1,
    "require_last_push_approval": false
  },
  "restrictions": null,
  "required_linear_history": false,
  "allow_force_pushes": false,
  "allow_deletions": false,
  "block_creations": false,
  "required_conversation_resolution": true,
  "lock_branch": false
}

# Regras aplicadas em `develop`:
# ✅ Require 1 approving review
# ✅ Dismiss stale reviews on new push
# ✅ Require status checks to pass (CI obrigatório)
# ✅ Require branch to be up to date before merging
# ✅ Require conversation resolution
# ✅ No force pushes
# ✅ No deletions
# ⚠️ enforce_admins: false (admins podem fazer merge direto em emergências)

# ==============================================================================
# PADRÃO DE BRANCHES PERMITIDAS
# ==============================================================================
#
# Branches aceitas no repositório:
#
# main          → produção (protegida, releases tagueados)
# develop       → dev/homolog (protegida, integração contínua)
# feature/*     → novas features (ex: feature/add-payment-flow)
# fix/*         → correções via develop (ex: fix/broken-login-redirect)
# hotfix/*      → correções emergenciais via main (ex: hotfix/checkout-crash)
# release/*     → preparação de release (ex: release/v1.5.0)
#
# Branches fora desse padrão podem ser bloqueadas via Ruleset (GitHub Enterprise)
# ou via GitHub Actions com validação de nome no evento pull_request.

# ==============================================================================
# GITHUB ACTIONS — Validação de nome de branch (opcional)
# ==============================================================================
#
# Crie o arquivo: .github/workflows/validate-branch-name.yml

name: Validate Branch Name

on:
  pull_request:
    branches:
      - main
      - develop

jobs:
  check-branch-name:
    runs-on: ubuntu-latest
    steps:
      - name: Check branch name pattern
        run: |
          BRANCH="${{ github.head_ref }}"
          PATTERN="^(feature|fix|hotfix|release)\/[a-z0-9._-]+$"
          if [[ ! "$BRANCH" =~ $PATTERN ]]; then
            echo "❌ Branch name '$BRANCH' does not follow the naming convention."
            echo "   Expected: feature/*, fix/*, hotfix/*, or release/*"
            exit 1
          fi
          echo "✅ Branch name '$BRANCH' is valid."

# ==============================================================================
# CODEOWNERS (opcional mas recomendado)
# ==============================================================================
#
# Crie o arquivo: .github/CODEOWNERS
#
# * @Vautch/team-core          # todos os arquivos exigem review do time core
# src/payments/ @Vautch/team-payments   # área de pagamentos: time específico
# .github/ @Vautch/team-devops          # configs de CI/CD: time de infra
